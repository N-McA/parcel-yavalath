<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Yavalath</title>
    <script type="module" src="/src/main.js"></script>
  </head>
  <body>
    <main class="app">
      <h1>Yavalath</h1>
      <p class="subtitle">4 in a row wins, but 3 in a row loses.</p>
      <div id="status">Your turn (Red)</div>
      <svg id="board" viewBox="0 0 900 780" aria-label="Yavalath board"></svg>
      <div class="controls">
        <button id="undo-move">Back one move</button>
        <button id="swap-move">Swap colors</button>
        <button id="new-game">New game</button>
        <button id="ai-move">AI move now</button>
        <button id="ai-first-move">AI plays first move</button>
        <label class="strength-control" for="ai-strength">
          AI strength
          <select id="ai-strength">
            <option value="0">Beginner</option>
            <option value="1">Intermediate</option>
            <option value="2" selected>Strong</option>
            <option value="3">Tournament</option>
          </select>
        </label>
      </div>
    </main>
  </body>
</html>
